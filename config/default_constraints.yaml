# PROTOTYPE CONSTRAINTS REQUIRING REVIEW BY A CONCRETE MATERIALS ENGINEER.
#
# Ingredient min/max ranges below are the observed minima and maxima of the
# public UCI Concrete Compressive Strength dataset (kg/m3), NOT engineering
# rules and NOT CEMEX production rules. They exist so the optimizer stays
# inside the region where the model has seen data. Water-to-binder and total
# mass limits are slightly tightened relative to the raw observed extremes to
# keep candidates in the well-populated part of the dataset; they must be
# replaced with real specification limits before any serious use.
ingredients:
  cement:            {min: 102.0, max: 540.0}
  slag:              {min: 0.0,   max: 359.4}
  fly_ash:           {min: 0.0,   max: 200.1}
  water:             {min: 121.8, max: 247.0}
  superplasticizer:  {min: 0.0,   max: 32.2}
  coarse_aggregate:  {min: 801.0, max: 1145.0}
  fine_aggregate:    {min: 594.0, max: 992.6}

# Water-to-binder ratio (water / (cement + slag + fly_ash)).
# Observed dataset range is roughly 0.27 to 1.88; the default window keeps
# candidates in the structurally sensible region.
water_binder_ratio: {min: 0.30, max: 0.75}

# Total mix mass per m3 (sum of the seven ingredients, kg).
# Observed dataset range is roughly 2160 to 2560 kg/m3.
total_mass: {min: 2200.0, max: 2550.0}

# Performance requirement defaults (editable in the app).
required_strength_mpa: 40.0
age_days: 28

# Safety / risk settings.
# conservative_strength = predicted - uncertainty_multiplier * uncertainty_mpa
#                                    - validation_error_buffer
uncertainty_multiplier: 1.0
# Candidates whose extrapolation score exceeds this are rejected
# (score <= 1.0 means inside the typical historical envelope).
max_extrapolation_score: 1.2
